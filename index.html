<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebP Converter - Batch Image Converter</title>
    <meta name="description" content="Convert multiple PNG, JPEG, and JPG images to WebP format instantly. Download all converted images as a ZIP file.">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                </div>
                <h1>WebP Converter</h1>
            </div>
            <p class="tagline">Convert PNG, JPEG & JPG to WebP instantly</p>
        </header>

        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17,8 12,3 7,8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <h2>Drop your images here</h2>
                    <p>or click to browse</p>
                    <span class="supported-formats">Supports PNG, JPEG, JPG</span>
                    <input type="file" id="fileInput" multiple accept=".png,.jpg,.jpeg,image/png,image/jpeg" hidden>
                </div>
            </section>

            <!-- Quality Slider -->
            <section class="quality-section" id="qualitySection">
                <div class="quality-control">
                    <label for="qualitySlider">
                        <span class="quality-label">WebP Quality</span>
                        <span class="quality-value" id="qualityValue">80%</span>
                    </label>
                    <input type="range" id="qualitySlider" min="1" max="100" value="80">
                </div>
            </section>

            <!-- Preview Grid -->
            <section class="preview-section" id="previewSection">
                <div class="preview-header">
                    <h3>Uploaded Images <span class="image-count" id="imageCount">(0)</span></h3>
                    <button class="btn btn-clear" id="clearBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3,6 5,6 21,6"/>
                            <path d="M19,6v14a2,2 0 0,1-2,2H7a2,2 0 0,1-2-2V6m3,0V4a2,2 0 0,1,2-2h4a2,2 0 0,1,2,2v2"/>
                        </svg>
                        Clear All
                    </button>
                </div>
                <div class="preview-grid" id="previewGrid"></div>
            </section>

            <!-- Action Buttons -->
            <section class="action-section" id="actionSection">
                <button class="btn btn-convert" id="convertBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6"/>
                        <path d="M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    Convert to WebP
                </button>
                <button class="btn btn-download" id="downloadBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download ZIP
                </button>
            </section>

            <!-- Progress Section -->
            <section class="progress-section" id="progressSection">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">Converting...</p>
            </section>

            <!-- Status Message -->
            <div class="status-message" id="statusMessage"></div>
        </main>

        <footer class="footer">
            <p>All conversions happen in your browser. No files are uploaded to any server.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
